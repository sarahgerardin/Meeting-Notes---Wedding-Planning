<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wedding Planning — Meeting Notes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #FAF7F5;
    color: #2C2C2C;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  .container { max-width: 820px; margin: 0 auto; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #8B6F6F;
    letter-spacing: 0.05em;
    margin-bottom: 0.2rem;
  }
  .subtitle { font-size: 12px; color: #AAA; margin-bottom: 1.5rem; }

  /* ── Meeting header ── */
  .meeting-header {
    display: flex;
    gap: 12px;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
  }
  .meeting-header input {
    flex: 1;
    min-width: 150px;
    font-size: 14px;
    padding: 7px 11px;
    border: 1px solid #DDD;
    border-radius: 8px;
    background: #fff;
    color: #2C2C2C;
    outline: none;
    font-family: inherit;
  }
  .meeting-header input:focus { border-color: #8B6F6F; }

  /* ── Generic section card ── */
  .section {
    background: #fff;
    border: 1px solid #E8DFDF;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  .section-head {
    background: #F5EFEF;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #3A2A2A;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ── Topics to discuss (bullet list) ── */
  .topic-list { padding: 8px; min-height: 50px; }

  .topic-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 4px;
    border-radius: 6px;
    transition: background 0.12s;
  }
  .topic-item:hover { background: #FAF7F5; }

  .bullet { color: #8B6F6F; font-size: 18px; line-height: 1.3; flex-shrink: 0; }

  .topic-text {
    font-size: 14px;
    flex: 1;
    line-height: 1.45;
    word-break: break-word;
    color: #2C2C2C;
  }
  .topic-text.discussed {
    text-decoration: line-through;
    color: #BBB;
  }
  .topic-text[contenteditable]:focus { outline: none; }

  .del {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #CCC;
    font-size: 16px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    font-family: inherit;
  }
  .topic-item:hover .del,
  .todo-item:hover .del { opacity: 1; }
  .del:hover { color: #8B6F6F; }

  /* discussed toggle btn */
  .tick-btn {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #CCC;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .topic-item:hover .tick-btn { opacity: 1; }
  .tick-btn.done { opacity: 1; color: #8B6F6F; }

  /* ── Add row ── */
  .add-row {
    display: flex;
    gap: 6px;
    padding: 6px 8px 9px;
    border-top: 1px solid #F0E8E8;
  }
  .add-row input {
    flex: 1;
    font-size: 13px;
    padding: 5px 9px;
    border: 1px solid #DDD;
    border-radius: 7px;
    background: #fff;
    color: #2C2C2C;
    outline: none;
    font-family: inherit;
  }
  .add-row input:focus { border-color: #8B6F6F; }
  .add-row button {
    font-size: 20px;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    color: #8B6F6F;
    padding: 0 4px;
    font-family: inherit;
  }
  .add-row button:hover { color: #5a3f3f; }

  /* ── Notes textarea ── */
  .notes-area {
    width: 100%;
    min-height: 140px;
    font-size: 14px;
    font-family: inherit;
    color: #2C2C2C;
    padding: 12px 14px;
    border: none;
    outline: none;
    resize: vertical;
    background: transparent;
    line-height: 1.6;
  }

  /* ── To-dos ── */
  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 1.25rem;
  }
  @media (max-width: 520px) { .cols { grid-template-columns: 1fr; } }

  .todo-list { padding: 8px; min-height: 50px; }

  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 4px;
    border-radius: 6px;
    transition: background 0.12s;
  }
  .todo-item:hover { background: #FAF7F5; }

  .todo-item input[type=checkbox] {
    margin-top: 3px;
    accent-color: #8B6F6F;
    flex-shrink: 0;
    cursor: pointer;
    width: 15px;
    height: 15px;
  }
  .todo-text {
    font-size: 14px;
    color: #2C2C2C;
    flex: 1;
    cursor: pointer;
    line-height: 1.45;
    word-break: break-word;
  }
  .todo-text.done { text-decoration: line-through; color: #BBB; }

  .section-head .clear-btn {
    font-size: 11px;
    background: none;
    border: 1px solid #D4C4C4;
    border-radius: 6px;
    padding: 2px 8px;
    cursor: pointer;
    color: #8B6F6F;
    font-family: inherit;
  }
  .section-head .clear-btn:hover { background: #EDE3E3; }

  /* ── Next meeting ── */
  .next-meeting-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

  .next-meeting-body input,
  .next-meeting-body textarea {
    font-size: 14px;
    font-family: inherit;
    color: #2C2C2C;
    padding: 7px 10px;
    border: 1px solid #E8DFDF;
    border-radius: 7px;
    background: #FAF7F5;
    outline: none;
    width: 100%;
  }
  .next-meeting-body input:focus,
  .next-meeting-body textarea:focus { border-color: #8B6F6F; }
  .next-meeting-body textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
  .field-label { font-size: 11px; color: #AAA; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* ── Bottom bar ── */
  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }
  .copy-btn {
    padding: 7px 18px;
    font-size: 13px;
    background: none;
    border: 1px solid #D4C4C4;
    border-radius: 8px;
    cursor: pointer;
    color: #2C2C2C;
    font-family: inherit;
  }
  .copy-btn:hover { background: #F5EFEF; }
  .reset-btn {
    padding: 7px 18px;
    font-size: 13px;
    background: none;
    border: 1px solid #E0D0D0;
    border-radius: 8px;
    cursor: pointer;
    color: #999;
    font-family: inherit;
  }
  .reset-btn:hover { background: #FAF0F0; color: #8B6F6F; }
  .toast { font-size: 12px; color: #8B6F6F; opacity: 0; transition: opacity 0.3s; }

  .empty-msg { font-size: 12px; color: #CCC; padding: 6px 4px; font-style: italic; }
</style>
</head>
<body>
<div class="container">

  <h1>WEDDING PLANNING — MEETING NOTES</h1>
  <p class="subtitle">Data saved automatically in your browser.</p>

  <!-- Client / Date -->
  <div class="meeting-header">
    <input id="client" placeholder="Client" oninput="save()" />
    <input id="meeting-date" type="date" oninput="save()" />
  </div>

  <!-- 1. TOPICS TO DISCUSS -->
  <div class="section">
    <div class="section-head">📋 Topics to discuss</div>
    <div class="topic-list" id="topic-list"></div>
    <div class="add-row">
      <input id="topic-input" placeholder="Add a topic…" onkeydown="if(event.key==='Enter')addTopic()" />
      <button onclick="addTopic()">+</button>
    </div>
  </div>

  <!-- 2. NOTES -->
  <div class="section">
    <div class="section-head">📝 Notes</div>
    <textarea class="notes-area" id="notes" placeholder="Free notes…" oninput="save()"></textarea>
  </div>

  <!-- 3. TO-DOS -->
  <div class="cols">
    <div class="section">
      <div class="section-head">
        ✅ Mes to-dos
        <button class="clear-btn" onclick="clearDone('my')">Clear done</button>
      </div>
      <div class="todo-list" id="my-list"></div>
      <div class="add-row">
        <input id="my-input" placeholder="Add…" onkeydown="if(event.key==='Enter')addTodo('my')" />
        <button onclick="addTodo('my')">+</button>
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        💑 Couple's to-dos
        <button class="clear-btn" onclick="clearDone('couple')">Clear done</button>
      </div>
      <div class="todo-list" id="couple-list"></div>
      <div class="add-row">
        <input id="couple-input" placeholder="Add…" onkeydown="if(event.key==='Enter')addTodo('couple')" />
        <button onclick="addTodo('couple')">+</button>
      </div>
    </div>
  </div>

  <!-- 4. NEXT MEETING -->
  <div class="section">
    <div class="section-head">📅 Next meeting</div>
    <div class="next-meeting-body">
      <div>
        <div class="field-label">Date &amp; time</div>
        <input id="next-date" type="datetime-local" oninput="save()" />
      </div>
      <div>
        <div class="field-label">Topics to cover</div>
        <textarea id="next-topics" placeholder="Topics for next meeting…" oninput="save()"></textarea>
      </div>
    </div>
  </div>

  <!-- Bottom actions -->
  <div class="bottom-bar">
    <button class="copy-btn" onclick="copyAll()">Copy summary</button>
    <button class="reset-btn" onclick="resetAll()">New meeting</button>
    <span class="toast" id="toast">Copié !</span>
  </div>

</div>
<script>
const KEY = 'weddingNotes_v2';
let state = { topics: [], my: [], couple: [] };

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── persist ── */
function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify({
      state,
      client: document.getElementById('client').value,
      date: document.getElementById('meeting-date').value,
      notes: document.getElementById('notes').value,
      nextDate: document.getElementById('next-date').value,
      nextTopics: document.getElementById('next-topics').value
    }));
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const d = JSON.parse(raw);
      state = d.state || { topics: [], my: [], couple: [] };
      document.getElementById('client').value = d.client || '';
      document.getElementById('meeting-date').value = d.date || '';
      document.getElementById('notes').value = d.notes || '';
      document.getElementById('next-date').value = d.nextDate || '';
      document.getElementById('next-topics').value = d.nextTopics || '';
    }
  } catch(e) {}
  renderTopics(); renderTodo('my'); renderTodo('couple');
}

/* ── topics ── */
function renderTopics() {
  const list = document.getElementById('topic-list');
  list.innerHTML = '';
  if (!state.topics.length) {
    list.innerHTML = '<p class="empty-msg">No topics yet</p>';
    return;
  }
  state.topics.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'topic-item';
    row.innerHTML =
      '<span class="bullet">•</span>' +
      '<span class="topic-text' + (item.done ? ' discussed' : '') + '">' + esc(item.text) + '</span>' +
      '<button class="tick-btn' + (item.done ? ' done' : '') + '" title="Marquer comme discuté" onclick="toggleTopic(' + i + ')">' + (item.done ? '✓' : '✓') + '</button>' +
      '<button class="del" onclick="removeTopic(' + i + ')">×</button>';
    list.appendChild(row);
  });
}

function addTopic() {
  const inp = document.getElementById('topic-input');
  const text = inp.value.trim();
  if (!text) return;
  state.topics.push({ text, done: false });
  inp.value = '';
  renderTopics(); save(); inp.focus();
}

function toggleTopic(i) {
  state.topics[i].done = !state.topics[i].done;
  renderTopics(); save();
}

function removeTopic(i) {
  state.topics.splice(i, 1);
  renderTopics(); save();
}

/* ── todos ── */
function renderTodo(side) {
  const list = document.getElementById(side + '-list');
  list.innerHTML = '';
  if (!state[side].length) {
    list.innerHTML = '<p class="empty-msg">No to-dos yet</p>';
    return;
  }
  state[side].forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'todo-item';
    row.innerHTML =
      '<input type="checkbox"' + (item.done ? ' checked' : '') + ' onchange="toggleTodo(\'' + side + '\',' + i + ')" />' +
      '<span class="todo-text' + (item.done ? ' done' : '') + '" onclick="toggleTodo(\'' + side + '\',' + i + ')">' + esc(item.text) + '</span>' +
      '<button class="del" onclick="removeTodo(\'' + side + '\',' + i + ')">×</button>';
    list.appendChild(row);
  });
}

function addTodo(side) {
  const inp = document.getElementById(side + '-input');
  const text = inp.value.trim();
  if (!text) return;
  state[side].push({ text, done: false });
  inp.value = '';
  renderTodo(side); save(); inp.focus();
}

function toggleTodo(side, i) {
  state[side][i].done = !state[side][i].done;
  renderTodo(side); save();
}

function removeTodo(side, i) {
  state[side].splice(i, 1);
  renderTodo(side); save();
}

function clearDone(side) {
  state[side] = state[side].filter(x => !x.done);
  renderTodo(side); save();
}

/* ── copy summary ── */
function copyAll() {
  const client = document.getElementById('client').value || '—';
  const date = document.getElementById('meeting-date').value || '—';
  const line = '─────────────────────────────────';

  let txt = 'MEETING NOTES — ' + client.toUpperCase() + '\n';
  txt += 'Date: ' + date + '\n';
  txt += line + '\n\n';

  txt += '📋 TOPICS TO DISCUSS\n';
  if (state.topics.length) {
    state.topics.forEach(x => {
      const mark = x.done ? '☑' : '☐';
      const label = x.done ? x.text.split('').join('\u0336') + '\u0336' : x.text;
      txt += '  ' + mark + '  ' + label + '\n';
    });
  } else { txt += '  (none)\n'; }

  txt += '\n' + line + '\n';
  txt += '📝 NOTES\n';
  txt += (document.getElementById('notes').value.trim() || '  (none)') + '\n';

  txt += '\n' + line + '\n';
  txt += '✅ MY TO-DOS\n';
  if (state.my.length) {
    state.my.forEach(x => {
      const mark = x.done ? '☑' : '☐';
      const label = x.done ? x.text.split('').join('\u0336') + '\u0336' : x.text;
      txt += '  ' + mark + '  ' + label + '\n';
    });
  } else { txt += '  (none)\n'; }

  txt += '\n💑 COUPLE\'S TO-DOS\n';
  if (state.couple.length) {
    state.couple.forEach(x => {
      const mark = x.done ? '☑' : '☐';
      const label = x.done ? x.text.split('').join('\u0336') + '\u0336' : x.text;
      txt += '  ' + mark + '  ' + label + '\n';
    });
  } else { txt += '  (none)\n'; }

  const nd = document.getElementById('next-date').value;
  const nt = document.getElementById('next-topics').value.trim();
  txt += '\n' + line + '\n';
  txt += '📅 NEXT MEETING\n';
  txt += '  Date & time: ' + (nd || '—') + '\n';
  txt += '  Topics: ' + (nt || '—') + '\n';

  navigator.clipboard.writeText(txt).then(() => {
    const t = document.getElementById('toast');
    t.style.opacity = 1;
    setTimeout(() => { t.style.opacity = 0; }, 1800);
  });
}

/* ── reset ── */
function resetAll() {
  if (!confirm('Start a new meeting? Current data will be cleared.')) return;
  state = { topics: [], my: [], couple: [] };
  ['client','meeting-date','notes','next-date','next-topics'].forEach(id => { document.getElementById(id).value = ''; });
  renderTopics(); renderTodo('my'); renderTodo('couple'); save();
}

load();
</script>
</body>
</html>
